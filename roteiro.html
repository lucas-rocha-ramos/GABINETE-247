<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteiro de Filmagens - Gabinete 247</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --brand-green: #113826; --accent-color: #0a84ff; }
        body { background: #000; color: #fff; padding: 2rem; font-family: -apple-system, sans-serif; }
        .app-container { background: rgba(30,30,32,0.8); backdrop-filter: blur(20px); border-radius: 24px; padding: 40px; max-width: 950px; margin: auto; }
        textarea { width: 100%; height: 120px; background: #222; color: #fff; padding: 15px; border-radius: 12px; border: 1px solid #444; margin: 10px 0; }
        .btn { background: var(--accent-color); color: white; padding: 15px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; width: 100%; }
        #script-sheet { background: #fff; color: #333; width: 850px; margin: 20px auto; padding: 40px; }
        .table-title { background: var(--brand-green); color: white; text-align: center; padding: 10px; font-weight: bold; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--brand-green); color: white; padding: 10px; font-size: 12px; }
        td { border: 1px solid #ddd; padding: 10px; vertical-align: top; font-size: 13px; }
        .ai-image { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent-color); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Gerador de Roteiros IA</h1>
    <p>Descreva seu evento para gerar o roteiro técnico.</p>
    <textarea id="prompt" placeholder="Ex: Roteiro para cobertura cinematográfica de um culto de jovens..."></textarea>
    <button class="btn" onclick="gerarRoteiro()">Gerar Roteiro e Imagens</button>

    <div id="loader" style="display:none; text-align:center; padding:20px;">
        <div class="spinner"></div> 
        <p id="status">Consultando IA...</p>
    </div>

    <div id="script-sheet">
        <h1 style="color:var(--brand-green)">ROTEIRO DE FILMAGENS</h1>
        <div class="table-title">CAPTAÇÕES E CENAS</div>
        <table id="tabela-cenas">
            <thead>
                <tr><th>CENA</th><th>CONTEÚDO</th><th>REF. IA</th><th>MOVIMENTOS</th><th>OBJETIVO</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    async function gerarRoteiro() {
        const prompt = document.getElementById('prompt').value;
        const loader = document.getElementById('loader');
        if(!prompt) return alert("Descreva o evento!");
        
        loader.style.display = 'block';

        // Instrução rígida para a IA retornar apenas o JSON puro
        const fullPrompt = `Crie um roteiro de filmagens de 4 cenas para: "${prompt}". Responda estritamente com um JSON array contendo objetos com estas chaves: "cena", "conteudo", "prompt", "mov", "obj". Não escreva nada além do JSON.`;
        const url = `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}`;

        try {
            const response = await fetch(url);
            let texto = await response.text();
            
            // Limpeza: garante que pegamos apenas o que está entre [ ]
            const start = texto.indexOf('[');
            const end = texto.lastIndexOf(']') + 1;
            const jsonPart = texto.substring(start, end);
            
            const cenas = JSON.parse(jsonPart);

            const tbody = document.querySelector('#tabela-cenas tbody');
            tbody.innerHTML = '';

            cenas.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${c.cena || '-'}</td>
                    <td>${c.conteudo || '-'}</td>
                    <td><img class="ai-image" src="https://image.pollinations.ai/prompt/${encodeURIComponent(c.prompt || 'cinematic shot')}?width=400&height=250&nologo=true"></td>
                    <td>${c.mov || '-'}</td>
                    <td>${c.obj || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
            loader.style.display = 'none';
        } catch(e) {
            console.error("Erro na extração:", e);
            alert("A IA demorou ou retornou erro. Tente descrever o evento de forma diferente.");
            loader.style.display = 'none';
        }
    }
</script>
</body>
</html>
