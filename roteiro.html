<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteiro de Filmagens - Gabinete 247</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';
        env.allowLocalModels = false;
        window.pipeline = pipeline;
    </script>
    <style>
        :root { --brand-green: #113826; --accent-color: #0a84ff; }
        body { background: #000; color: #fff; padding: 2rem; font-family: -apple-system, sans-serif; }
        .app-container { background: rgba(30,30,32,0.8); backdrop-filter: blur(20px); border-radius: 24px; padding: 40px; max-width: 950px; margin: auto; }
        textarea { width: 100%; height: 120px; background: #222; color: #fff; padding: 15px; border-radius: 12px; border: 1px solid #444; margin: 10px 0; }
        .btn { background: var(--accent-color); color: white; padding: 15px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; }
        
        /* Folha de Roteiro */
        #script-sheet { background: #fff; color: #333; width: 850px; margin: 20px auto; padding: 40px; }
        .table-title { background: var(--brand-green); color: white; text-align: center; padding: 10px; font-weight: bold; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--brand-green); color: white; padding: 10px; font-size: 12px; }
        td { border: 1px solid #ddd; padding: 10px; vertical-align: top; }
        .ai-image { width: 100%; height: 100px; object-fit: cover; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Gerador de Roteiros IA</h1>
    <textarea id="prompt" placeholder="Descreva o evento (ex: Culto de jovens 'Desperta' em Cuiabá, 13 de Julho)..."></textarea>
    <button class="btn" onclick="gerarTudo()">Gerar Roteiro e Imagens</button>

    <div id="loader" style="display:none; text-align:center; padding:20px;">
        <div class="spinner"></div> 
        <p id="status">Processando IA localmente (pode demorar na 1ª vez)...</p>
    </div>

    <div id="script-sheet">
        <h1 style="color:var(--brand-green)">ROTEIRO DE FILMAGENS</h1>
        <div class="table-title">CAPTAÇÕES E CENAS</div>
        <table id="tabela-cenas">
            <thead>
                <tr><th>CENA</th><th>CONTEÚDO</th><th>REF. IA</th><th>MOVIMENTOS</th><th>OBJETIVO</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    let generator = null;

    window.gerarTudo = async function() {
        const prompt = document.getElementById('prompt').value;
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        
        loader.style.display = 'block';
        
        try {
            if (!generator) generator = await window.pipeline('text-generation', 'Xenova/phi-2');
            status.innerText = "Criando roteiro...";
            
            // IA gera a estrutura do roteiro
            const res = await generator(`Crie um roteiro de 4 cenas para: ${prompt}. Formato JSON: [{"cena":1, "conteudo":"...", "prompt":"...", "mov":"...", "obj":"..."}]`, { max_new_tokens: 400 });
            const texto = res[0].generated_text;
            const jsonPart = texto.substring(texto.indexOf('['), texto.lastIndexOf(']')+1);
            const cenas = JSON.parse(jsonPart);

            const tbody = document.querySelector('#tabela-cenas tbody');
            tbody.innerHTML = '';

            cenas.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${c.cena}</td>
                    <td>${c.conteudo}</td>
                    <td><img class="ai-image" src="https://image.pollinations.ai/prompt/${encodeURIComponent(c.prompt)}?width=400&height=250&nologo=true"></td>
                    <td>${c.mov}</td>
                    <td>${c.obj}</td>
                `;
                tbody.appendChild(tr);
            });
            loader.style.display = 'none';
        } catch(e) {
            alert("Erro: " + e.message);
            loader.style.display = 'none';
        }
    }
</script>
</body>
</html>
