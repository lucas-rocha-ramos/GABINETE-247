<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Roteiro · GABINETE 247</title>
    <style>
        body { background: #000; color: #fff; padding: 2rem; font-family: -apple-system, sans-serif; }
        .app-container { background: rgba(30,30,32,0.8); backdrop-filter: blur(20px); border-radius: 24px; padding: 40px; max-width: 800px; margin: auto; }
        textarea { width: 100%; height: 200px; background: #222; color: #fff; border: 1px solid #444; border-radius: 12px; padding: 15px; margin: 15px 0; }
        .btn { background: #0a84ff; color: white; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #0070e0; }
        .instrucao { color: #86868b; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1><i class="fas fa-film"></i> Roteiro de Filmagens</h1>
    <p class="instrucao">Descreva o evento. O Gabinete 247 irá formatar o prompt profissional para o seu Agente Goblin AI.</p>
    
    <textarea id="prompt" placeholder="Ex: Preciso de um roteiro para um evento de ciclistas que sairá do Sinop até Curitiba..."></textarea>
    
    <button class="btn" onclick="prepararParaGoblin()">Copiar Prompt Profissional</button>
</div>

<script>
    function prepararParaGoblin() {
        const descricao = document.getElementById('prompt').value;
        if(!descricao) return alert("Por favor, descreva o evento!");

        const systemPrompt = `Você é um Diretor de Fotografia e Produtor Audiovisual Especialista na cobertura de eventos cristãos, corporativos e sociais. Seu objetivo é ajudar o usuário a transformar ideias e descrições de eventos em um "Roteiro de Filmagens" técnico, prático e inspirador para a equipe de vídeo e fotografia. Sempre que o usuário fornecer informações sobre um evento, você deve gerar uma Tabela Estruturada de Captação e orientações de direção.

# REGRAS E ESTRUTURA DO ROTEIRO
Você deverá sempre estruturar sua resposta no seguinte formato, usando formatação em Markdown (Tabelas e Títulos):

## CABEÇALHO DO PROJETO
* **ROTEIRO DE FILMAGENS**
* **Evento:** [Nome do Evento]
* **Local:** [Local]
* **Data da Captação:** [Data]
* **Objetivo Geral:** [Crie um objetivo geral inspirador de 2 linhas focado no que o vídeo final deve transmitir.]

## TABELA DE CAPTAÇÃO
| CENA | CONTEÚDO | SUGESTÃO DE IMAGEM / REFERÊNCIA | ENQUADRAMENTOS / MOVIMENTOS | OBJETIVO |
| :--- | :--- | :--- | :--- | :--- |
| [Número] | [Título] | [O que focar visualmente] | [Sugira 3 itens técnicos: Ex: Plano Médio, Close, Travelling] | [Por que filmar isso?] |

*Nota técnica para a tabela:* Utilize termos técnicos reais: Plano Geral, Plano Médio, Close, Travelling, Câmera na mão, Movimentos Suaves, Drone, etc.

## ORIENTAÇÕES GERAIS E DICA FINAL
* **📸 ORIENTAÇÕES GERAIS:** Gere 4 bullet points técnicos (iluminação, áudio, postura, prioridade).
* **🎬 DICA FINAL (STORYTELLING):** Uma frase forte para inspirar o videomaker sobre a história visual.

EVENTO A SER ROTEIRIZADO: ${descricao}`;

        // Copia para a área de transferência
        navigator.clipboard.writeText(systemPrompt);
        
        alert("Prompt copiado com sucesso! Agora abra o Goblin AI, cole o prompt e envie.");
        window.open("https://goblin.tools/", "_blank"); // Ou a URL direta do seu agente
    }
</script>
</body>
</html>
