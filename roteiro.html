<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Roteiro de Filmagens - IA Local</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';
        env.allowLocalModels = false;
        window.pipeline = pipeline;
    </script>
    <style>
        /* [Mesmos estilos do anterior para manter o padrão visual] */
        body { background: #000; color: #fff; padding: 2rem; font-family: sans-serif; }
        .glass-panel { background: rgba(30,30,32,0.8); border-radius: 24px; padding: 40px; max-width: 900px; margin: auto; }
        .btn { background: #0a84ff; color: white; padding: 15px; border-radius: 12px; border: none; cursor: pointer; width: 100%; font-weight: bold; }
        #loader { display: none; text-align: center; margin-top: 20px; }
        textarea { width: 100%; height: 150px; background: #222; color: #fff; padding: 15px; border-radius: 12px; border: none; margin: 10px 0; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>Roteiro de Filmagens (IA Local)</h1>
    <p>Descreva seu evento abaixo. A IA vai processar tudo aqui no seu navegador.</p>
    
    <textarea id="prompt" placeholder="Ex: Roteiro para cobertura de um evento religioso no Grande Templo de Cuiabá..."></textarea>
    <button class="btn" onclick="gerarRoteiroLocal()">Gerar Roteiro (Offline)</button>

    <div id="loader">
        <div class="spinner"></div>
        <p id="status">Carregando cérebro da IA (1ª vez demora um pouco)...</p>
    </div>

    <div id="output" style="margin-top: 20px; line-height: 1.6; white-space: pre-wrap; color: #ccc;"></div>
</div>

<script>
    let generator = null;

    async function gerarRoteiroLocal() {
        const prompt = document.getElementById('prompt').value;
        const loader = document.getElementById('loader');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        if(!prompt) return alert("Descreva o evento!");

        loader.style.display = 'block';
        
        try {
            if (!generator) {
                status.innerText = "Baixando modelo de IA (isso acontece só na primeira vez)...";
                // Usando o modelo Phi-3 (Tiny) que roda localmente
                generator = await window.pipeline('text-generation', 'Xenova/phi-2');
            }

            status.innerText = "Escrevendo roteiro...";
            
            const fullPrompt = `Crie um roteiro de filmagens detalhado e profissional com 5 cenas para: ${prompt}. Formate como uma lista técnica de filmagem.`;
            
            const result = await generator(fullPrompt, {
                max_new_tokens: 500,
                temperature: 0.7
            });

            output.innerText = result[0].generated_text.split(fullPrompt)[1] || result[0].generated_text;
            loader.style.display = 'none';

        } catch (e) {
            console.error(e);
            status.innerText = "Erro ao rodar IA local. Tente um dispositivo mais potente.";
        }
    }
</script>
</body>
</html>
