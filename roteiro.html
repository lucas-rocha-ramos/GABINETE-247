<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Roteiros Profissional</title>
    <style>
        :root { --brand-green: #113826; }
        body { background: #000; color: #fff; padding: 2rem; font-family: sans-serif; }
        .app-container { background: #1a1a1a; border-radius: 24px; padding: 40px; max-width: 950px; margin: auto; }
        textarea { width: 100%; height: 120px; background: #222; color: #fff; padding: 15px; border-radius: 12px; border: 1px solid #444; margin: 10px 0; }
        .btn { background: #0a84ff; color: white; padding: 15px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; width: 100%; }
        
        /* Estilo da Tabela Profissional */
        #script-sheet { background: #fff; color: #333; width: 850px; margin: 20px auto; padding: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--brand-green); color: white; padding: 12px; font-size: 13px; text-transform: uppercase; }
        td { border: 1px solid #ddd; padding: 15px; vertical-align: top; font-size: 13px; }
        .mov-list { margin: 0; padding-left: 15px; font-weight: 500; }
        .ai-image { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Gerador de Roteiros de Filmagem</h1>
    <textarea id="prompt" placeholder="Descreva o evento detalhadamente..."></textarea>
    <button class="btn" onclick="gerarRoteiro()">Gerar Roteiro Profissional</button>

    <div id="script-sheet">
        <h1 style="color:var(--brand-green); text-align:center;">ROTEIRO DE FILMAGENS</h1>
        <table id="tabela-cenas">
            <thead>
                <tr>
                    <th>CENA</th><th>CONTEÚDO</th><th>REF. IA</th><th>MOVIMENTOS/ENQUADRAMENTOS</th><th>OBJETIVO</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    async function gerarRoteiro() {
        const prompt = document.getElementById('prompt').value;
        const loader = document.getElementById('loader');
        
        // Novo Prompt "Diretor de Fotografia"
        const fullPrompt = `Crie um roteiro de filmagens técnico para: "${prompt}". 
        O formato deve ser um JSON array de objetos. 
        Cada objeto deve ter:
        - "cena": número da cena.
        - "conteudo": título da cena.
        - "prompt": descrição detalhada para IA gerar imagem (em inglês).
        - "movimentos": uma string com pontos (Ex: "• Plano Médio\n• Drone\n• Close nos detalhes").
        - "objetivo": uma frase curta sobre o objetivo da cena.
        Gere pelo menos 5 cenas. Retorne apenas JSON puro.`;

        const url = `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}`;
        
        try {
            const response = await fetch(url);
            let texto = await response.text();
            const cenas = JSON.parse(texto.substring(texto.indexOf('['), texto.lastIndexOf(']') + 1));

            const tbody = document.querySelector('#tabela-cenas tbody');
            tbody.innerHTML = '';

            cenas.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="text-align:center; font-size:24px; font-weight:bold;">${c.cena}</td>
                    <td style="font-weight:bold; text-transform:uppercase;">${c.conteudo}</td>
                    <td><img class="ai-image" src="https://image.pollinations.ai/prompt/${encodeURIComponent(c.prompt)}?width=400&height=250&nologo=true"></td>
                    <td><ul class="mov-list">${c.movimentos.replace(/•/g, '').split('\n').map(m => m.trim() ? `<li>${m}</li>` : '').join('')}</ul></td>
                    <td>${c.objetivo}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch(e) {
            alert("Erro ao formatar o roteiro. Tente um prompt mais descritivo.");
        }
    }
</script>
</body>
</html>
