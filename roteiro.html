<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteiro de Filmagens - Gabinete 247</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { 
            --brand-green: #113826; 
            --accent-color: #0a84ff; 
            --gradient: linear-gradient(135deg, #0a84ff, #6c5ce7);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: #fff; 
            padding: 2rem; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh;
        }
        .app-container { 
            background: rgba(30,30,32,0.95); 
            backdrop-filter: blur(20px); 
            border-radius: 24px; 
            padding: 40px; 
            max-width: 1100px; 
            margin: auto;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        h1 { font-size: 2.2rem; margin-bottom: 0.5rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .input-group { 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap;
            margin: 20px 0;
        }
        textarea { 
            flex: 1;
            min-width: 200px;
            height: 80px; 
            background: #1a1a1a; 
            color: #fff; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            font-size: 14px;
            transition: all 0.3s;
        }
        textarea:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 20px rgba(10,132,255,0.1);
        }
        .btn { 
            background: var(--gradient); 
            color: white; 
            padding: 15px 35px; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(10,132,255,0.3); }
        .btn:active { transform: scale(0.98); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            margin-top: 10px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        #script-sheet { 
            background: #fff; 
            color: #222; 
            width: 100%; 
            max-width: 1000px;
            margin: 30px auto; 
            padding: 30px; 
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: none;
        }
        .table-title { 
            background: var(--brand-green); 
            color: white; 
            text-align: center; 
            padding: 12px; 
            font-weight: bold; 
            margin: 20px 0;
            border-radius: 8px;
            font-size: 18px;
            letter-spacing: 1px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 13px;
        }
        th { 
            background: var(--brand-green); 
            color: white; 
            padding: 12px 10px; 
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td { 
            border: 1px solid #e0e0e0; 
            padding: 12px; 
            vertical-align: top; 
        }
        td:first-child { font-weight: bold; color: var(--brand-green); text-align: center; width: 60px; }
        .ai-image { 
            width: 100%; 
            height: 120px; 
            object-fit: cover; 
            border-radius: 8px; 
            background: #f0f0f0;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .ai-image:hover { transform: scale(1.03); }
        .image-placeholder {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
        }
        .spinner { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid var(--accent-color); 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loader-container {
            display: none;
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .loader-container p { color: #aaa; margin-top: 10px; }
        
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .badge {
            display: inline-block;
            background: rgba(10,132,255,0.15);
            color: var(--accent-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        @media (max-width: 768px) {
            .app-container { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .input-group { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            td, th { font-size: 11px; padding: 8px; }
            #script-sheet { padding: 15px; }
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.5s;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🎬 Roteiro Automático com IA</h1>
    <p class="subtitle">Descreva seu evento e gere um roteiro técnico completo com imagens <span class="badge">Beta</span></p>
    
    <div class="input-group">
        <textarea id="prompt" placeholder="Ex: Roteiro para um culto de jovens em Cuiabá, com foco na banda, pregador e testemunhos..."></textarea>
        <button class="btn" onclick="gerarRoteiro()">
            <i class="fas fa-magic" style="margin-right:8px;"></i> Gerar Roteiro
        </button>
    </div>

    <div id="loaderContainer" class="loader-container">
        <div class="spinner"></div>
        <p id="statusText">🔄 Gerando roteiro com IA...</p>
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <p style="font-size: 12px; color: #666;">Isso pode levar alguns segundos</p>
    </div>

    <div id="script-sheet">
        <h1 style="color:var(--brand-green); font-size: 24px; text-align: center;">📋 ROTEIRO DE FILMAGENS</h1>
        <div style="text-align: center; color: #666; font-size: 14px; margin-bottom: 10px;">
            <i class="far fa-calendar-alt"></i> Gerado em: <span id="dataGeracao"></span>
        </div>
        <div class="table-title">🎯 CAPTAÇÕES E CENAS</div>
        <table id="tabela-cenas">
            <thead>
                <tr>
                    <th>CENA</th>
                    <th>CONTEÚDO</th>
                    <th>VISUALIZAÇÃO</th>
                    <th>MOVIMENTOS</th>
                    <th>OBJETIVO</th>
                </tr>
            </thead>
            <tbody id="tbodyCenas"></tbody>
        </table>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="exportarComoImagem()">
                <i class="fas fa-download"></i> Exportar como Imagem
            </button>
            <button class="btn btn-secondary" onclick="window.print()">
                <i class="fas fa-print"></i> Imprimir / PDF
            </button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // CONFIGURAÇÃO DAS APIS (TODAS PÚBLICAS E OPEN SOURCE)
    // ============================================
    const APIS = {
        // 1. Pollinations.ai - Geração de texto + imagens (totalmente gratuita)
        pollinations: {
            url: 'https://text.pollinations.ai/',
            imageUrl: 'https://image.pollinations.ai/prompt/'
        },
        // 2. Hugging Face - Modelos open source (opcional, precisa de token gratuito)
        huggingface: {
            url: 'https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-dev',
            token: '' // Deixe vazio para usar modelos públicos sem token
        }
    };

    // ============================================
    // GERAR ROTEIRO PRINCIPAL
    // ============================================
    async function gerarRoteiro() {
        const prompt = document.getElementById('prompt').value.trim();
        if (!prompt) {
            alert('✏️ Por favor, descreva o evento para gerar o roteiro!');
            return;
        }

        // Mostrar loader
        const loader = document.getElementById('loaderContainer');
        const status = document.getElementById('statusText');
        const progress = document.getElementById('progressFill');
        loader.style.display = 'block';
        document.getElementById('script-sheet').style.display = 'none';
        
        status.textContent = '🔄 Gerando roteiro com IA...';
        progress.style.width = '20%';

        try {
            // ===== PASSO 1: Gerar roteiro em JSON via Pollinations =====
            const fullPrompt = `Crie um roteiro de filmagens com 4 cenas para: ${prompt}. 
            Responda APENAS com um array JSON contendo objetos com as chaves: "cena", "conteudo", "prompt_imagem", "mov", "obj". 
            Use prompts de imagem descritivos e cinematográficos. Exemplo de prompt_imagem: "wide shot, cinematic, dramatic lighting".
            Sem formatação markdown, apenas o JSON puro.`;

            status.textContent = '🧠 Gerando estrutura do roteiro...';
            progress.style.width = '40%';

            const response = await fetch(`${APIS.pollinations.url}${encodeURIComponent(fullPrompt)}?json=true`);
            
            if (!response.ok) throw new Error('Falha na geração do roteiro');
            
            const roteiro = await response.json();
            
            if (!Array.isArray(roteiro) || roteiro.length === 0) {
                throw new Error('Resposta inválida da IA');
            }

            status.textContent = '🎨 Gerando imagens para cada cena...';
            progress.style.width = '60%';

            // ===== PASSO 2: Gerar imagens para cada cena =====
            const cenasComImagens = await Promise.all(
                roteiro.map(async (cena, index) => {
                    const promptImagem = cena.prompt_imagem || cena.conteudo || 'cinematic scene';
                    
                    // Tenta gerar imagem com Pollinations
                    const imgUrl = await gerarImagemPollinations(promptImagem);
                    
                    return {
                        ...cena,
                        imgUrl: imgUrl
                    };
                })
            );

            progress.style.width = '90%';

            // ===== PASSO 3: Renderizar na tabela =====
            renderizarRoteiro(cenasComImagens);
            
            progress.style.width = '100%';
            status.textContent = '✅ Roteiro gerado com sucesso!';
            
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('script-sheet').style.display = 'block';
            }, 500);

        } catch (error) {
            console.error('Erro:', error);
            status.textContent = '❌ Erro ao gerar roteiro. Tente novamente.';
            alert(`Erro: ${error.message}\nTente novamente com um prompt diferente.`);
            loader.style.display = 'none';
        }
    }

    // ============================================
    // GERAR IMAGEM - POLLINATIONS (PÚBLICA)
    // ============================================
    async function gerarImagemPollinations(prompt) {
        try {
            // Prompt enriquecido para melhor qualidade
            const promptEnriquecido = `${prompt}, high quality, professional cinematography, 4k, detailed, dramatic lighting`;
            const url = `${APIS.pollinations.imageUrl}${encodeURIComponent(promptEnriquecido)}?width=400&height=250&nologo=true`;
            
            // Testa se a imagem é acessível
            const testResponse = await fetch(url, { method: 'HEAD' });
            if (testResponse.ok) {
                return url;
            }
            throw new Error('Falha ao gerar imagem');
        } catch (error) {
            console.warn('Erro na Pollinations, tentando fallback...', error);
            return gerarImagemFallback(prompt);
        }
    }

    // ============================================
    // FALLBACK - IMAGEM PLACEHOLDER COM CORES
    // ============================================
    function gerarImagemFallback(prompt) {
        // Gera uma imagem placeholder com base no prompt
        const colors = ['0a84ff', '6c5ce7', '00b894', 'fdcb6e', 'e17055', '0984e3'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        const text = prompt.substring(0, 30);
        return `https://via.placeholder.com/400x250/${color}/ffffff?text=${encodeURIComponent(text)}`;
    }

    // ============================================
    // RENDERIZAR ROTEIRO NA TABELA
    // ============================================
    function renderizarRoteiro(cenas) {
        const tbody = document.getElementById('tbodyCenas');
        tbody.innerHTML = '';
        
        // Data de geração
        document.getElementById('dataGeracao').textContent = 
            new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

        cenas.forEach((cena, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align:center; font-weight:bold; color:var(--brand-green);">
                    ${cena.cena || `CENA ${index + 1}`}
                </td>
                <td style="font-size:12px;">${cena.conteudo || 'Conteúdo não especificado'}</td>
                <td style="width:150px;">
                    <img 
                        src="${cena.imgUrl}" 
                        alt="Cena ${index + 1}" 
                        class="ai-image"
                        onerror="this.src='https://via.placeholder.com/400x250/666/fff?text=Erro+ao+carregar'"
                        loading="lazy"
                    >
                </td>
                <td style="font-size:12px;">${cena.mov || 'Plano estático'}</td>
                <td style="font-size:12px;">${cena.obj || 'Registro da cena'}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ============================================
    // EXPORTAR COMO IMAGEM
    // ============================================
    async function exportarComoImagem() {
        const element = document.getElementById('script-sheet');
        try {
            const canvas = await html2canvas(element, {
                scale: 2,
                backgroundColor: '#ffffff',
                allowTaint: true,
                useCORS: true,
                logging: false
            });
            
            const link = document.createElement('a');
            link.download = `roteiro-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (error) {
            alert('Erro ao exportar imagem. Tente usar o botão "Imprimir" para salvar como PDF.');
        }
    }

    // ============================================
    // KEYBOARD SHORTCUT (Ctrl+Enter para gerar)
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
        const textarea = document.getElementById('prompt');
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                gerarRoteiro();
            }
        });
        
        // Exemplo de prompt inicial para teste
        textarea.placeholder = 'Ex: Roteiro para evento de lançamento de campanha política em Cuiabá, com discurso, entrevistas e interação com o público...';
    });

    // ============================================
    // API ALTERNATIVA - HUGGING FACE (OPCIONAL)
    // ============================================
    async function gerarImagemHuggingFace(prompt) {
        if (!APIS.huggingface.token) {
            console.warn('Token do Hugging Face não configurado');
            return gerarImagemFallback(prompt);
        }

        try {
            const response = await fetch(APIS.huggingface.url, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${APIS.huggingface.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ inputs: prompt })
            });

            if (!response.ok) throw new Error('Erro na API do Hugging Face');
            
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            return url;
        } catch (error) {
            console.warn('Erro no Hugging Face, usando fallback:', error);
            return gerarImagemFallback(prompt);
        }
    }
</script>

</body>
</html>
