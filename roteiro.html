<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador Inteligente · Gabinete 247</title>
    <style>
        body { background: #000; color: #fff; padding: 2rem; font-family: sans-serif; }
        .container { max-width: 800px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 20px; }
        textarea { width: 100%; height: 150px; background: #222; color: #fff; border: 1px solid #444; border-radius: 12px; padding: 15px; margin: 15px 0; }
        .btn { background: #0a84ff; color: white; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Roteiro Inteligente</h1>
    <p>Descreva o evento. O Gabinete 247 enviará os detalhes para o seu Agente Gemini.</p>
    
    <textarea id="descricao" placeholder="Ex: Roteiro para o evento EBO 52 em Cuiabá..."></textarea>
    
    <!-- Este botão dispara a instrução para o seu Agente -->
    <button class="btn" onclick="enviarParaAgente()">Enviar para o Agente Gemini</button>
</div>

<script>
    function enviarParaAgente() {
        const descricao = document.getElementById('descricao').value;
        if(!descricao) return alert("Descreva o evento!");

        // Instrução técnica para o agente
        const promptTecnico = `Aja como meu Diretor de Fotografia. 
        Crie um roteiro de filmagem detalhado para: ${descricao}.
        Entregue em formato de tabela com colunas: CENA, CONTEÚDO, SUGESTÃO DE IMAGEM (com prompt detalhado para IA), MOVIMENTOS DE CÂMERA, OBJETIVO.
        Ao final, gere as imagens solicitadas.`;

        // Aqui está o "pulo do gato": 
        // Se o seu Agente Gemini estiver em uma URL específica, nós o abrimos 
        // ou enviamos a mensagem via postMessage se o iframe for seu.
        
        // Exemplo: abrindo o agente numa nova aba com o prompt pronto (substitua pela sua URL)
        const urlAgente = "https://aistudio.google.com/app/prompts/new_chat"; // Ou seu agente customizado
        window.open(urlAgente, '_blank');
        
        alert("Instrução técnica montada! Cole o texto abaixo no seu Agente:\n\n" + promptTecnico);
    }
</script>
</body>
</html>
