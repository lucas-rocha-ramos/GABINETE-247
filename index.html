<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABINETE 247</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- IMPORTA O CÉREBRO DE DADOS -->
    <script src="ferramentas.js"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --sidebar-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0066cc;
            --accent-hover: #e8f0fe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            z-index: 10;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .brand i {
            color: var(--accent);
            font-size: 1.4rem;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            list-style: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .nav-item i {
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.2s ease;
            width: 20px;
            text-align: center;
        }

        .nav-item:hover { background-color: rgba(0,0,0,0.03); }
        .nav-item.active { background-color: var(--accent-hover); color: var(--accent); }
        .nav-item.active i { color: var(--accent); }

        .content-area {
            flex: 1;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--bg-color);
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                padding: 1rem;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            .brand { margin-bottom: 0; }
            .nav-menu { flex-direction: row; overflow-x: auto; }
            .nav-item span { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <i class="fas fa-layer-group"></i>
            GABINETE 247
        </div>
        <nav>
            <!-- A LISTA ESTÁ VAZIA, O JAVASCRIPT VAI PREENCHER -->
            <ul class="nav-menu" id="menu-dinamico"></ul>
        </nav>
    </aside>

    <main class="content-area">
        <iframe name="app-frame" id="main-frame" src="inicio.html" title="Aplicativo GABINETE 247"></iframe>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuContainer = document.getElementById('menu-dinamico');

            // 1. Constrói o menu lendo o arquivo ferramentas.js
            ferramentasGabinete.forEach(ferramenta => {
                const li = document.createElement('li');
                const isAtivo = ferramenta.id === 'inicio' ? 'active' : '';
                
                li.innerHTML = `
                    <a href="${ferramenta.arquivo}" target="app-frame" class="nav-item ${isAtivo}" data-id="${ferramenta.id}">
                        <i class="${ferramenta.icone}"></i>
                        <span>${ferramenta.nome}</span>
                    </a>
                `;
                menuContainer.appendChild(li);
            });

            // 2. Lógica para mudar a cor do botão ativo ao clicar
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', function() {
                    navItems.forEach(nav => nav.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
