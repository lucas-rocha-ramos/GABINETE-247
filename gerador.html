<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Posts · Chico Guarnieri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* [Seus estilos permanecem os mesmos] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e8ecf1; font-family: 'Segoe UI', Roboto, Arial, sans-serif; padding: 2rem 1rem; }
        .app { max-width: 1200px; margin: 0 auto; background: white; border-radius: 2rem; box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2); padding: 2rem; }
        h1 { font-size: 1.6rem; font-weight: 700; color: #0a1628; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.6rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .control-panel { background: #f7f9fc; border-radius: 1.5rem; padding: 1.8rem; }
        .btn { border: none; padding: 0.7rem 1.6rem; border-radius: 3rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.6rem; justify-content: center; width: 100%; margin-top: 0.5rem; }
        .btn-instagram { background: #e1306c; color: white; }
        .btn-instagram:hover { background: #c1255a; }
        /* ... (restante dos seus estilos originais) ... */
    </style>
</head>
<body>

<div class="app">
    <h1><i class="fas fa-image"></i> Gerador de Posts · Chico Guarnieri</h1>

    <div class="grid-2">
        <div class="control-panel">
            <!-- [Seus campos e botões originais] -->
            
            <div class="btn-download-group">
                <button class="btn btn-success" id="download1080">1080x1920</button>
                <button class="btn btn-success" id="download1350">1080x1350</button>
            </div>

            <!-- NOVA FUNÇÃO ADICIONADA -->
            <button class="btn btn-instagram" onclick="publicarInstagram()">
                <i class="fab fa-instagram"></i> Publicar no Instagram
            </button>
        </div>

        <!-- [Sua área de preview] -->
    </div>
</div>

<script>
    // [Seu script original continua...]

    // NOVA FUNÇÃO DE PUBLICAÇÃO
    function publicarInstagram() {
        // Abre o Instagram diretamente na tela de criação de post
        // Nota: O Instagram não permite via web enviar a imagem automaticamente por segurança,
        // então esta função direciona o usuário para o editor de posts do navegador.
        window.open('https://www.instagram.com/create/post/', '_blank');
        alert("O Instagram abrirá em uma nova aba. Basta arrastar a imagem que você baixou para lá!");
    }

    // [Restante do seu script original...]
</script>

</body>
</html>
