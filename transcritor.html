<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Transcrição iOS 26 · Real</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0a0b0e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .ios-card {
      max-width: 820px;
      width: 100%;
      background: rgba(28, 30, 36, 0.68);
      backdrop-filter: blur(36px) saturate(180%);
      -webkit-backdrop-filter: blur(36px) saturate(180%);
      border-radius: 56px;
      padding: 32px 28px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 0.5px rgba(255, 255, 255, 0.06) inset;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      position: relative;
      z-index: 10;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
    }

    .header i {
      font-size: 28px;
      color: #0a84ff;
      background: rgba(10, 132, 255, 0.15);
      padding: 10px;
      border-radius: 18px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 590;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    .header span {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      margin-left: auto;
      background: rgba(255, 255, 255, 0.06);
      padding: 6px 14px;
      border-radius: 40px;
    }

    .upload-area {
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px dashed rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      padding: 36px 20px;
      text-align: center;
      margin-bottom: 28px;
      transition: all 0.3s ease;
    }

    .upload-area:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(10, 132, 255, 0.5);
    }

    .upload-area i {
      font-size: 40px;
      color: #0a84ff;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    .upload-area p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
    }

    .upload-area .formats {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 6px;
    }

    #fileInput {
      display: none;
    }

    .btn-upload {
      background: #0a84ff;
      border: none;
      color: white;
      padding: 12px 32px;
      border-radius: 40px;
      font-size: 17px;
      font-weight: 500;
      margin-top: 18px;
      box-shadow: 0 8px 20px rgba(10, 132, 255, 0.25);
      transition: all 0.2s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-upload:hover {
      background: #0066d9;
      transform: scale(0.97);
    }

    .btn-upload:active {
      transform: scale(0.94);
    }

    .particles-wrapper {
      position: relative;
      width: 100%;
      height: 110px;
      border-radius: 32px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(4px);
      margin: 18px 0 22px;
      overflow: hidden;
      border: 0.5px solid rgba(255, 255, 255, 0.04);
    }

    #particleCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .status-text {
      position: absolute;
      bottom: 14px;
      left: 24px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 15px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      padding: 6px 18px;
      border-radius: 40px;
      border: 0.3px solid rgba(255, 255, 255, 0.08);
      z-index: 20;
    }

    .status-text i {
      margin-right: 8px;
      color: #0a84ff;
    }

    .transcription-box {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
      border-radius: 36px;
      padding: 24px 20px;
      margin-top: 18px;
      border: 0.5px solid rgba(255, 255, 255, 0.04);
      max-height: 340px;
      overflow-y: auto;
    }

    .transcription-box::-webkit-scrollbar {
      width: 4px;
    }
    .transcription-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
    }

    .transcription-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.04);
      animation: fadeIn 0.4s ease forwards;
    }

    .transcription-item:last-child {
      border-bottom: none;
    }

    .transcription-item .character {
      font-weight: 600;
      color: #0a84ff;
      min-width: 70px;
      font-size: 15px;
      background: rgba(10, 132, 255, 0.08);
      padding: 4px 12px;
      border-radius: 30px;
      text-align: center;
    }

    .transcription-item .time {
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      min-width: 62px;
    }

    .transcription-item .text {
      color: rgba(255, 255, 255, 0.88);
      font-size: 16px;
      line-height: 1.5;
    }

    .empty-message {
      color: rgba(255, 255, 255, 0.25);
      text-align: center;
      padding: 32px 0;
      font-size: 15px;
    }

    .empty-message i {
      font-size: 32px;
      display: block;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .badge-processing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(10, 132, 255, 0.15);
      padding: 6px 16px;
      border-radius: 60px;
      color: #0a84ff;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .badge-processing i {
      animation: spin 1.6s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 540px) {
      .ios-card {
        padding: 20px 16px;
        border-radius: 40px;
      }
      .header h1 {
        font-size: 20px;
      }
      .transcription-item {
        flex-wrap: wrap;
        gap: 6px;
      }
    }

    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(10, 132, 255, 0.05) 0%, transparent 70%);
      top: -80px;
      right: -80px;
      pointer-events: none;
      border-radius: 50%;
    }
    .ios-card {
      position: relative;
      overflow: hidden;
    }
    .glow2 {
      left: -100px;
      bottom: -100px;
      top: auto;
      right: auto;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.02) 0%, transparent 70%);
    }
  </style>
</head>
<body>

<div class="ios-card">
  <div class="glow"></div>
  <div class="glow glow2"></div>

  <div class="header">
    <i class="fas fa-microchip"></i>
    <h1>Transcrição <span style="font-weight:300;">iOS 26</span></h1>
    <span><i class="fas fa-circle" style="color:#0a84ff; font-size: 10px;"></i> neural</span>
  </div>

  <div class="upload-area" id="dropArea">
    <i class="fas fa-cloud-upload-alt"></i>
    <p><strong>Envie áudio ou vídeo</strong></p>
    <p class="formats">MP3, WAV, M4A, MP4, MOV · transcrição real com Web Speech API</p>
    <button class="btn-upload" id="uploadBtn"><i class="fas fa-plus-circle"></i> Escolher arquivo</button>
    <input type="file" id="fileInput" accept="audio/*,video/*">
  </div>

  <div class="particles-wrapper">
    <canvas id="particleCanvas"></canvas>
    <div class="status-text" id="statusText">
      <i class="fas fa-circle" style="color:#0a84ff; font-size: 10px;"></i> pronto para transcrição
    </div>
  </div>

  <div class="transcription-box" id="transcriptionBox">
    <div class="empty-message" id="emptyMessage">
      <i class="fas fa-wave-square"></i>
      <span>Nenhuma transcrição ainda</span>
      <p style="font-size:13px; margin-top:8px;">envie um arquivo para começar</p>
    </div>
    <div id="transcriptionList"></div>
  </div>

  <div style="margin-top: 16px; display: flex; justify-content: flex-end;">
    <span style="color: rgba(255,255,255,0.15); font-size: 12px;">
      <i class="fas fa-lock" style="margin-right: 4px;"></i> processamento local
    </span>
  </div>
</div>

<script>
  (function() {
    // ----- PARTÍCULAS (canvas) -----
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    let animationFrame;
    let isProcessing = false;

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      width = canvas.width;
      height = canvas.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 2.8 + 1.2;
        this.speedX = (Math.random() - 0.5) * 1.2;
        this.speedY = (Math.random() - 0.5) * 1.2;
        this.opacity = Math.random() * 0.7 + 0.25;
        this.color = `rgba(10, 132, 255, ${this.opacity})`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (isProcessing) {
          this.size += (Math.random() - 0.5) * 0.4;
          this.size = Math.min(Math.max(this.size, 0.8), 4.8);
          this.opacity += (Math.random() - 0.5) * 0.06;
          this.opacity = Math.min(Math.max(this.opacity, 0.15), 0.95);
          this.color = `rgba(10, 132, 255, ${this.opacity})`;
        }

        if (this.x < -10) this.x = width + 10;
        if (this.x > width + 10) this.x = -10;
        if (this.y < -10) this.y = height + 10;
        if (this.y > height + 10) this.y = -10;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowColor = 'rgba(10, 132, 255, 0.5)';
        ctx.shadowBlur = 18;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function initParticles(count = 80) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, width, height);
      
      if (isProcessing) {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(10, 132, 255, ${0.12 * (1 - dist / 120)})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
      }

      for (let p of particles) {
        p.update();
        p.draw();
      }
      animationFrame = requestAnimationFrame(drawParticles);
    }

    initParticles(80);
    drawParticles();

    function setProcessingState(active) {
      isProcessing = active;
    }

    // ----- TRANSCRIÇÃO REAL COM WEB SPEECH API -----
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const dropArea = document.getElementById('dropArea');
    const statusText = document.getElementById('statusText');
    const transcriptionList = document.getElementById('transcriptionList');
    const emptyMessage = document.getElementById('emptyMessage');

    let recognition = null;
    let isTranscribing = false;
    let transcriptParts = [];
    let startTime = 0;
    let segmentCounter = 0;

    // Inicializa reconhecimento de fala
    function initSpeechRecognition() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> Web Speech API não suportada`;
        return null;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      return recognition;
    }

    // Processa arquivo de áudio/vídeo
    function processFile(file) {
      // Verifica se é vídeo ou áudio
      const isVideo = file.type.startsWith('video/');
      const isAudio = file.type.startsWith('audio/');

      if (!isVideo && !isAudio) {
        statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> formato não suportado`;
        return;
      }

      // Cria URL para o arquivo
      const url = URL.createObjectURL(file);
      
      // Cria elemento de áudio/vídeo para extrair áudio
      let mediaElement;
      if (isVideo) {
        mediaElement = document.createElement('video');
        mediaElement.muted = true;
        mediaElement.playsInline = true;
      } else {
        mediaElement = document.createElement('audio');
      }
      
      mediaElement.src = url;
      mediaElement.controls = false;
      mediaElement.style.display = 'none';
      document.body.appendChild(mediaElement);

      // Limpa transcrições anteriores
      transcriptionList.innerHTML = '';
      emptyMessage.style.display = 'none';
      transcriptParts = [];
      segmentCounter = 0;

      // Ativa processamento
      setProcessingState(true);
      statusText.innerHTML = `<i class="fas fa-spinner fa-pulse" style="color:#0a84ff;"></i> carregando áudio...`;

      // Carrega o áudio
      mediaElement.addEventListener('loadedmetadata', function() {
        startTime = Date.now();
        
        // Verifica se tem áudio
        if (mediaElement.duration === 0 || mediaElement.duration === Infinity) {
          statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> arquivo sem áudio detectado`;
          setProcessingState(false);
          document.body.removeChild(mediaElement);
          return;
        }

        statusText.innerHTML = `<i class="fas fa-microphone" style="color:#0a84ff;"></i> transcrevendo... (${Math.round(mediaElement.duration)}s)`;

        // Inicia a reprodução e captura
        mediaElement.play().then(() => {
          // Inicializa Web Speech API para capturar áudio do sistema
          if (!recognition) {
            recognition = initSpeechRecognition();
            if (!recognition) {
              statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> API de fala não disponível`;
              setProcessingState(false);
              document.body.removeChild(mediaElement);
              return;
            }
          }

          // Configura eventos do recognition
          recognition.onresult = function(event) {
            let finalTranscript = '';
            let interimTranscript = '';
            
            for (let i = event.resultIndex; i < event.results.length; i++) {
              const transcript = event.results[i][0].transcript;
              if (event.results[i].isFinal) {
                finalTranscript += transcript;
              } else {
                interimTranscript += transcript;
              }
            }

            if (finalTranscript) {
              const currentTime = (Date.now() - startTime) / 1000;
              const minutes = Math.floor(currentTime / 60);
              const seconds = Math.floor(currentTime % 60);
              const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
              
              // Adiciona segmento de transcrição
              addTranscriptionSegment('Falante', timeStr, finalTranscript.trim());
              transcriptParts.push({ time: timeStr, text: finalTranscript.trim() });
            }
          };

          recognition.onerror = function(event) {
            console.error('Erro no reconhecimento:', event.error);
            if (event.error === 'not-allowed') {
              statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> permissão de microfone negada`;
            }
          };

          recognition.onend = function() {
            // Quando termina, finaliza
            if (mediaElement && !mediaElement.paused) {
              // Se o áudio ainda estiver tocando, tenta reiniciar
              try {
                recognition.start();
              } catch (e) {
                console.log('Recognition já iniciado');
              }
            } else {
              finalizeTranscription();
            }
          };

          // Inicia reconhecimento
          try {
            recognition.start();
          } catch (e) {
            console.log('Recognition já iniciado');
          }

          // Monitora fim do áudio
          mediaElement.addEventListener('ended', function() {
            if (recognition) {
              try {
                recognition.stop();
              } catch (e) {}
            }
            finalizeTranscription();
          });

          // Atualiza status periodicamente
          const statusInterval = setInterval(() => {
            if (mediaElement && !mediaElement.paused) {
              const currentTime = Math.round(mediaElement.currentTime);
              const duration = Math.round(mediaElement.duration);
              statusText.innerHTML = `<i class="fas fa-microphone" style="color:#0a84ff;"></i> transcrevendo... ${currentTime}/${duration}s`;
            }
          }, 1000);

          // Armazena intervalo para limpar depois
          mediaElement._statusInterval = statusInterval;

        }).catch(error => {
          console.error('Erro ao reproduzir:', error);
          statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> erro ao processar áudio`;
          setProcessingState(false);
          document.body.removeChild(mediaElement);
        });

      }, { once: true });

      // Fallback se não carregar
      setTimeout(() => {
        if (mediaElement && mediaElement.readyState < 2) {
          statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> erro no carregamento do áudio`;
          setProcessingState(false);
          if (mediaElement.parentNode) document.body.removeChild(mediaElement);
        }
      }, 5000);
    }

    function addTranscriptionSegment(character, time, text) {
      const div = document.createElement('div');
      div.className = 'transcription-item';
      div.innerHTML = `
        <span class="character">${character}</span>
        <span class="time">${time}</span>
        <span class="text">${text}</span>
      `;
      transcriptionList.appendChild(div);
      // Scroll para o final
      const box = document.getElementById('transcriptionBox');
      box.scrollTop = box.scrollHeight;
    }

    function finalizeTranscription() {
      setProcessingState(false);
      statusText.innerHTML = `<i class="fas fa-check-circle" style="color:#30d158;"></i> transcrição concluída`;
      
      // Remove elemento de mídia
      const mediaElements = document.querySelectorAll('audio, video');
      mediaElements.forEach(el => {
        if (el._statusInterval) clearInterval(el._statusInterval);
        if (el.parentNode) el.parentNode.removeChild(el);
        URL.revokeObjectURL(el.src);
      });

      if (transcriptParts.length === 0) {
        emptyMessage.style.display = 'block';
        emptyMessage.innerHTML = `
          <i class="fas fa-exclamation-circle"></i>
          <span>Nenhuma fala detectada</span>
          <p style="font-size:13px; margin-top:8px; color:rgba(255,255,255,0.3);">
            Verifique se o arquivo contém áudio com fala
          </p>
        `;
      }
    }

    // Eventos de upload
    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        processFile(file);
      }
      fileInput.value = '';
    });

    // Drag and drop
    dropArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropArea.style.borderColor = '#0a84ff';
      dropArea.style.background = 'rgba(10,132,255,0.05)';
    });

    dropArea.addEventListener('dragleave', () => {
      dropArea.style.borderColor = 'rgba(255,255,255,0.15)';
      dropArea.style.background = 'rgba(255,255,255,0.03)';
    });

    dropArea.addEventListener('drop', (e) => {
      e.preventDefault();
      dropArea.style.borderColor = 'rgba(255,255,255,0.15)';
      dropArea.style.background = 'rgba(255,255,255,0.03)';
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
    });

    // Verifica suporte à API
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> API não suportada neste navegador`;
    }

    // Limpeza
    window.addEventListener('beforeunload', () => {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      const mediaElements = document.querySelectorAll('audio, video');
      mediaElements.forEach(el => {
        if (el._statusInterval) clearInterval(el._statusInterval);
        if (el.parentNode) el.parentNode.removeChild(el);
        URL.revokeObjectURL(el.src);
      });
    });

  })();
</script>
</body>
</html>
