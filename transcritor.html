<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralSync™ Audio - IA Proprietária</title>
    <style>
        /* Variáveis de estilo iOS 26 / Futuristic Apple */
        :root {
            --bg-color: #000000;
            --glass-bg: rgba(30, 30, 32, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a5;
            --accent-color: #0a84ff;
            --accent-glow: rgba(10, 132, 255, 0.5);
            --timestamp-color: #32d74b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden;
            background: radial-gradient(circle at 15% 50%, rgba(72, 49, 157, 0.4), transparent 50%), radial-gradient(circle at 85% 30%, rgba(10, 132, 255, 0.3), transparent 50%), #000000; background-attachment: fixed;
        }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 36px; width: 90%; max-width: 800px; min-height: 500px; padding: 40px; box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #fff, #a0a0a5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-secondary); font-size: 15px; margin-top: 8px; }

        #upload-section { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 24px; padding: 60px 20px; cursor: pointer; transition: all 0.3s ease; }
        #upload-section:hover { border-color: var(--accent-color); background: rgba(10, 132, 255, 0.05); }
        .upload-icon { font-size: 48px; margin-bottom: 16px; }
        .upload-btn { background: var(--accent-color); color: white; border: none; padding: 14px 32px; border-radius: 20px; font-size: 16px; font-weight: 600; margin-top: 20px; cursor: pointer; box-shadow: 0 8px 24px var(--accent-glow); }
        
        #processing-section { display: none; flex-direction: column; align-items: center; justify-content: center; height: 300px; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 1s ease; }
        .processing-text { position: relative; z-index: 1; font-size: 18px; font-weight: 500; animation: pulse 2s infinite; text-align: center; line-height: 1.5; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.5); } 100% { opacity: 0.6; } }

        #result-section { display: none; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .transcription-box { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 24px; max-height: 400px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .transcription-box::-webkit-scrollbar { width: 8px; }
        .transcription-box::-webkit-scrollbar-track { background: transparent; }
        .transcription-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .speech-block { margin-bottom: 24px; line-height: 1.6; }
        .meta-info { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; font-size: 14px; }
        .timestamp { color: var(--timestamp-color); font-family: "SF Mono", monospace; font-weight: 500; background: rgba(50, 215, 75, 0.1); padding: 2px 8px; border-radius: 8px; }
        .speaker { font-weight: 600; color: var(--accent-color); }
        .text { color: rgba(255, 255, 255, 0.9); font-size: 16px; padding-left: 10px; border-left: 2px solid rgba(255,255,255,0.1); }

        .action-buttons { display: flex; justify-content: flex-end; margin-top: 24px; gap: 12px; }
        .btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px 24px; border-radius: 16px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.2s; font-size: 14px; font-weight: 500; }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn-primary { background: var(--accent-color); border: none; }
        .btn-primary:hover { background: #007aff; box-shadow: 0 4px 15px var(--accent-glow); }
    </style>
</head>
<body>

    <div class="glass-panel" id="main-panel">
        <canvas id="particles"></canvas>
        
        <div class="header">
            <h1>NeuralSync™ Audio</h1>
            <p>Processamento neural em infraestrutura própria</p>
        </div>

        <div id="upload-section">
            <div class="upload-icon">🎙️</div>
            <h3>Toque ou arraste seu arquivo</h3>
            <p style="color: var(--text-secondary); margin-top: 8px; font-size: 14px;">Sem limite de tamanho (Até 2GB suportados)</p>
            <button class="upload-btn">Selecionar Arquivo</button>
        </div>

        <div id="processing-section">
            <div class="processing-text" id="status-text">Iniciando análise neural profunda...<br><span style="font-size: 14px; color: var(--text-secondary); font-weight: normal; margin-top: 10px; display: block;">Isso pode levar alguns minutos dependendo do tamanho do vídeo.</span></div>
        </div>

        <div id="result-section">
            <div class="transcription-box"></div>
            <div class="action-buttons">
                <button class="btn" onclick="location.reload()">Nova Transcrição</button>
                <button class="btn btn-primary" onclick="window.print()">Salvar PDF</button>
            </div>
        </div>
    </div>

    <script>
        // Animação de Partículas (IA avançada)
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        function initParticles() {
            canvas.width = document.getElementById('main-panel').offsetWidth;
            canvas.height = document.getElementById('main-panel').offsetHeight;
            particlesArray = [];
            for (let i = 0; i < (canvas.width * canvas.height) / 6000; i++) {
                particlesArray.push(new Particle(
                    (Math.random() * (canvas.width - 4) + 2), (Math.random() * (canvas.height - 4) + 2), 
                    (Math.random() * 2) - 1, (Math.random() * 2) - 1, 
                    (Math.random() * 2) + 1, '#0a84ff'
                ));
            }
        }

        class Particle {
            constructor(x, y, dx, dy, size, color) { this.x = x; this.y = y; this.dx = dx; this.dy = dy; this.size = size; this.color = color; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); ctx.fillStyle = '#ffffff'; ctx.fill(); }
            update() {
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                this.x += this.dx; this.y += this.dy; this.draw();
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) ** 2) + ((particlesArray[a].y - particlesArray[b].y) ** 2);
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        ctx.strokeStyle = `rgba(10, 132, 255, ${1 - (distance / 10000)})`;
                        ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                    }
                }
            }
        }

        let animationFrameId;
        function animate() {
            animationFrameId = requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => p.update());
            connect();
        }

        // Lógica de Envio para a API Python Própria
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'audio/*,video/*';

        const uploadSection = document.getElementById('upload-section');
        const processingSection = document.getElementById('processing-section');
        const resultSection = document.getElementById('result-section');
        const transcriptionBox = document.querySelector('.transcription-box');
        const statusText = document.getElementById('status-text');

        uploadSection.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Limite de segurança de 2GB (Para não travar a memória do navegador)
            if (file.size > 2 * 1024 * 1024 * 1024) {
                alert("O arquivo tem mais de 2GB! Limite máximo atingido.");
                return;
            }

            // Inicia interface de carregamento
            uploadSection.style.display = 'none';
            processingSection.style.display = 'flex';
            canvas.style.opacity = 1;
            initParticles(); animate();

            const formData = new FormData();
            formData.append('file', file);

            try {
                // ATENÇÃO: Aqui definimos a URL da sua API Python.
                // Troque "http://localhost:8000" pela URL do seu servidor quando colocar no ar (ex: Render/Railway).
                const API_URL = 'http://localhost:8000/transcribe';
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Erro do servidor Python (${response.status}): ${errorText}`);
                }

                const data = await response.json();

                if (data.error) throw new Error(data.error);

                // Para animação e mostra os resultados
                cancelAnimationFrame(animationFrameId);
                canvas.style.opacity = 0;
                processingSection.style.display = 'none';
                resultSection.style.display = 'block';
                transcriptionBox.innerHTML = '';

                if (data.segments && data.segments.length > 0) {
                    data.segments.forEach(segment => {
                        // Formata segundos do backend (ex: 65) para o visual [01:05]
                        const minutes = Math.floor(segment.start / 60).toString().padStart(2, '0');
                        const seconds = Math.floor(segment.start % 60).toString().padStart(2, '0');
                        
                        transcriptionBox.innerHTML += `
                            <div class="speech-block">
                                <div class="meta-info">
                                    <span class="timestamp">[${minutes}:${seconds}]</span>
                                    <span class="speaker">${segment.speaker || "Orador"}</span>
                                </div>
                                <div class="text">${segment.text}</div>
                            </div>
                        `;
                    });
                } else {
                    transcriptionBox.innerHTML = '<p style="color: white; text-align: center;">Nenhuma fala detectada.</p>';
                }

            } catch (error) {
                console.error(error);
                alert('Falha na comunicação com a API.\nVerifique se o seu backend Python está rodando e tente novamente.\n\nDetalhe: ' + error.message);
                location.reload();
            }
        });

        // Refaz as partículas se redimensionar a tela
        window.addEventListener('resize', () => { if (canvas.style.opacity == 1) initParticles(); });
    </script>
</body>
</html>
