<script>
    // Configuração das Partículas (Mantida igual para o efeito visual)
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particlesArray;

    function initParticles() {
        canvas.width = document.getElementById('main-panel').offsetWidth;
        canvas.height = document.getElementById('main-panel').offsetHeight;
        particlesArray = [];
        let numberOfParticles = (canvas.width * canvas.height) / 6000;
        
        for (let i = 0; i < numberOfParticles; i++) {
            let size = (Math.random() * 2) + 1;
            let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
            let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
            let directionX = (Math.random() * 2) - 1;
            let directionY = (Math.random() * 2) - 1;
            let color = '#0a84ff';
            particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
        }
    }

    class Particle {
        constructor(x, y, directionX, directionY, size, color) {
            this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY; this.size = size; this.color = color;
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); ctx.fillStyle = '#ffffff'; ctx.fill();
        }
        update() {
            if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
            if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
            this.x += this.directionX; this.y += this.directionY; this.draw();
        }
    }

    function connect() {
        let opacityValue = 1;
        for (let a = 0; a < particlesArray.length; a++) {
            for (let b = a; b < particlesArray.length; b++) {
                let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                               ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                    opacityValue = 1 - (distance / 10000);
                    ctx.strokeStyle = 'rgba(10, 132, 255,' + opacityValue + ')';
                    ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                }
            }
        }
    }

    let animationFrameId;
    function animate() {
        animationFrameId = requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); }
        connect();
    }

    window.addEventListener('resize', () => { if (canvas.style.opacity == 1) initParticles(); });

    // --- LÓGICA DE BACKEND REAL ---
    
    // Cria um input de arquivo oculto
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'audio/*,video/*';

    const uploadSection = document.getElementById('upload-section');
    const processingSection = document.getElementById('processing-section');
    const resultSection = document.getElementById('result-section');
    const processingText = document.querySelector('.processing-text');
    const transcriptionBox = document.querySelector('.transcription-box');

    // Ao clicar na área de upload, abre o seletor de arquivos
    uploadSection.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Esconde upload e mostra processamento
        uploadSection.style.display = 'none';
        processingSection.style.display = 'flex';
        
        // Inicia a animação de IA
        canvas.style.opacity = 1;
        initParticles();
        animate();

        processingText.innerText = "Fazendo upload e analisando...";

        const formData = new FormData();
        formData.append('file', file);

        try {
            // Envia para nossa API na Vercel
            const response = await fetch('/api/transcribe', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.error) throw new Error(data.error);

            // Para a animação
            cancelAnimationFrame(animationFrameId);
            canvas.style.opacity = 0;
            processingSection.style.display = 'none';
            resultSection.style.display = 'block';

            // Limpa o conteúdo de exemplo
            transcriptionBox.innerHTML = '';

            // Renderiza os segmentos reais retornados pela OpenAI
            if (data.segments && data.segments.length > 0) {
                data.segments.forEach(segment => {
                    // Formata o tempo de segundos para [MM:SS]
                    const minutes = Math.floor(segment.start / 60).toString().padStart(2, '0');
                    const seconds = Math.floor(segment.start % 60).toString().padStart(2, '0');
                    const timeString = `[${minutes}:${seconds}]`;

                    const block = `
                        <div class="speech-block">
                            <div class="meta-info">
                                <span class="timestamp">${timeString}</span>
                                <span class="speaker">Orador</span>
                            </div>
                            <div class="text">
                                ${segment.text}
                            </div>
                        </div>
                    `;
                    transcriptionBox.innerHTML += block;
                });
            } else {
                transcriptionBox.innerHTML = '<p style="color: white; padding: 20px;">Não foi possível identificar falas neste arquivo.</p>';
            }

        } catch (error) {
            alert('Erro na transcrição: ' + error.message);
            location.reload(); // Reinicia em caso de erro
        }
    });
</script>
