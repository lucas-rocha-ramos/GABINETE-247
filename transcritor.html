<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Transcrição iOS 26 · Vídeo para Áudio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0a0b0e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .ios-card {
      max-width: 820px;
      width: 100%;
      background: rgba(28, 30, 36, 0.68);
      backdrop-filter: blur(36px) saturate(180%);
      -webkit-backdrop-filter: blur(36px) saturate(180%);
      border-radius: 56px;
      padding: 32px 28px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 0.5px rgba(255, 255, 255, 0.06) inset;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      position: relative;
      z-index: 10;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
    }

    .header i {
      font-size: 28px;
      color: #0a84ff;
      background: rgba(10, 132, 255, 0.15);
      padding: 10px;
      border-radius: 18px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 590;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    .header span {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      margin-left: auto;
      background: rgba(255, 255, 255, 0.06);
      padding: 6px 14px;
      border-radius: 40px;
    }

    .upload-area {
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px dashed rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      padding: 36px 20px;
      text-align: center;
      margin-bottom: 28px;
      transition: all 0.3s ease;
    }

    .upload-area:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(10, 132, 255, 0.5);
    }

    .upload-area i {
      font-size: 40px;
      color: #0a84ff;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    .upload-area p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
    }

    .upload-area .formats {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 6px;
    }

    #fileInput {
      display: none;
    }

    .btn-upload {
      background: #0a84ff;
      border: none;
      color: white;
      padding: 12px 32px;
      border-radius: 40px;
      font-size: 17px;
      font-weight: 500;
      margin-top: 18px;
      box-shadow: 0 8px 20px rgba(10, 132, 255, 0.25);
      transition: all 0.2s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-upload:hover {
      background: #0066d9;
      transform: scale(0.97);
    }

    .btn-upload:active {
      transform: scale(0.94);
    }

    .particles-wrapper {
      position: relative;
      width: 100%;
      height: 110px;
      border-radius: 32px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(4px);
      margin: 18px 0 22px;
      overflow: hidden;
      border: 0.5px solid rgba(255, 255, 255, 0.04);
    }

    #particleCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .status-text {
      position: absolute;
      bottom: 14px;
      left: 24px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 15px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      padding: 6px 18px;
      border-radius: 40px;
      border: 0.3px solid rgba(255, 255, 255, 0.08);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-text i {
      color: #0a84ff;
    }

    .transcription-box {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
      border-radius: 36px;
      padding: 24px 20px;
      margin-top: 18px;
      border: 0.5px solid rgba(255, 255, 255, 0.04);
      max-height: 340px;
      overflow-y: auto;
    }

    .transcription-box::-webkit-scrollbar {
      width: 4px;
    }
    .transcription-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
    }

    .transcription-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.04);
      animation: fadeIn 0.4s ease forwards;
    }

    .transcription-item:last-child {
      border-bottom: none;
    }

    .transcription-item .character {
      font-weight: 600;
      color: #0a84ff;
      min-width: 70px;
      font-size: 15px;
      background: rgba(10, 132, 255, 0.08);
      padding: 4px 12px;
      border-radius: 30px;
      text-align: center;
    }

    .transcription-item .time {
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      min-width: 62px;
    }

    .transcription-item .text {
      color: rgba(255, 255, 255, 0.88);
      font-size: 16px;
      line-height: 1.5;
    }

    .empty-message {
      color: rgba(255, 255, 255, 0.25);
      text-align: center;
      padding: 32px 0;
      font-size: 15px;
    }

    .empty-message i {
      font-size: 32px;
      display: block;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .badge-processing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(10, 132, 255, 0.15);
      padding: 6px 16px;
      border-radius: 60px;
      color: #0a84ff;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .badge-processing i {
      animation: spin 1.6s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 540px) {
      .ios-card {
        padding: 20px 16px;
        border-radius: 40px;
      }
      .header h1 {
        font-size: 20px;
      }
      .transcription-item {
        flex-wrap: wrap;
        gap: 6px;
      }
      .transcription-item .character {
        min-width: 60px;
        font-size: 13px;
      }
    }

    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(10, 132, 255, 0.05) 0%, transparent 70%);
      top: -80px;
      right: -80px;
      pointer-events: none;
      border-radius: 50%;
    }
    .ios-card {
      position: relative;
      overflow: hidden;
    }
    .glow2 {
      left: -100px;
      bottom: -100px;
      top: auto;
      right: auto;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.02) 0%, transparent 70%);
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #0a84ff, #30d158);
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }
  </style>
</head>
<body>

<div class="ios-card">
  <div class="glow"></div>
  <div class="glow glow2"></div>

  <div class="header">
    <i class="fas fa-microchip"></i>
    <h1>Transcrição <span style="font-weight:300;">iOS 26</span></h1>
    <span><i class="fas fa-circle" style="color:#0a84ff; font-size: 10px;"></i> neural</span>
  </div>

  <div class="upload-area" id="dropArea">
    <i class="fas fa-cloud-upload-alt"></i>
    <p><strong>Envie vídeo ou áudio</strong></p>
    <p class="formats">MP4, MOV, AVI, MKV, MP3, WAV, M4A · extração automática de áudio</p>
    <button class="btn-upload" id="uploadBtn"><i class="fas fa-plus-circle"></i> Escolher arquivo</button>
    <input type="file" id="fileInput" accept="video/*,audio/*">
  </div>

  <div class="particles-wrapper">
    <canvas id="particleCanvas"></canvas>
    <div class="status-text" id="statusText">
      <i class="fas fa-circle" style="font-size: 10px;"></i> pronto para transcrição
    </div>
  </div>

  <div class="transcription-box" id="transcriptionBox">
    <div class="empty-message" id="emptyMessage">
      <i class="fas fa-wave-square"></i>
      <span>Nenhuma transcrição ainda</span>
      <p style="font-size:13px; margin-top:8px; color:rgba(255,255,255,0.3);">
        envie um vídeo ou áudio para começar
      </p>
    </div>
    <div id="transcriptionList"></div>
  </div>

  <div style="margin-top: 16px; display: flex; justify-content: flex-end; gap: 16px;">
    <span style="color: rgba(255,255,255,0.15); font-size: 12px;">
      <i class="fas fa-lock" style="margin-right: 4px;"></i> processamento local
    </span>
    <span style="color: rgba(255,255,255,0.1); font-size: 12px;" id="fileInfo"></span>
  </div>
</div>

<script>
  (function() {
    // ----- PARTÍCULAS (canvas) -----
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    let animationFrame;
    let isProcessing = false;

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      width = canvas.width;
      height = canvas.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 2.8 + 1.2;
        this.speedX = (Math.random() - 0.5) * 1.2;
        this.speedY = (Math.random() - 0.5) * 1.2;
        this.opacity = Math.random() * 0.7 + 0.25;
        this.color = `rgba(10, 132, 255, ${this.opacity})`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (isProcessing) {
          this.size += (Math.random() - 0.5) * 0.4;
          this.size = Math.min(Math.max(this.size, 0.8), 4.8);
          this.opacity += (Math.random() - 0.5) * 0.06;
          this.opacity = Math.min(Math.max(this.opacity, 0.15), 0.95);
          this.color = `rgba(10, 132, 255, ${this.opacity})`;
        }

        if (this.x < -10) this.x = width + 10;
        if (this.x > width + 10) this.x = -10;
        if (this.y < -10) this.y = height + 10;
        if (this.y > height + 10) this.y = -10;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowColor = 'rgba(10, 132, 255, 0.5)';
        ctx.shadowBlur = 18;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function initParticles(count = 80) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, width, height);
      
      if (isProcessing) {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(10, 132, 255, ${0.12 * (1 - dist / 120)})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
      }

      for (let p of particles) {
        p.update();
        p.draw();
      }
      animationFrame = requestAnimationFrame(drawParticles);
    }

    initParticles(80);
    drawParticles();

    function setProcessingState(active) {
      isProcessing = active;
    }

    // ----- EXTRAÇÃO DE ÁUDIO E TRANSCRIÇÃO -----
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const dropArea = document.getElementById('dropArea');
    const statusText = document.getElementById('statusText');
    const transcriptionList = document.getElementById('transcriptionList');
    const emptyMessage = document.getElementById('emptyMessage');
    const fileInfo = document.getElementById('fileInfo');

    let recognition = null;
    let isTranscribing = false;
    let transcriptParts = [];
    let startTime = 0;
    let segmentCounter = 0;

    // Inicializa reconhecimento de fala
    function initSpeechRecognition() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> API não suportada`;
        return null;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      return recognition;
    }

    // Extrai áudio do vídeo usando Web Audio API
    function extractAudioFromVideo(videoElement) {
      return new Promise((resolve, reject) => {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioContext.createMediaElementSource(videoElement);
          const destination = audioContext.createMediaStreamDestination();
          
          source.connect(destination);
          source.connect(audioContext.destination);
          
          const mediaRecorder = new MediaRecorder(destination.stream, {
            mimeType: 'audio/webm;codecs=opus'
          });

          const audioChunks = [];

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              audioChunks.push(event.data);
            }
          };

          mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            resolve(audioBlob);
          };

          mediaRecorder.onerror = (error) => {
            reject(error);
          };

          // Inicia gravação
          mediaRecorder.start(1000);

          // Toca o vídeo para extrair o áudio
          videoElement.play().then(() => {
            // Quando o vídeo terminar, para a gravação
            videoElement.onended = () => {
              if (mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
              }
            };

            // Fallback: para após a duração do vídeo
            const duration = videoElement.duration * 1000;
            setTimeout(() => {
              if (mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
              }
            }, duration + 1000);

          }).catch(reject);

          // Se o vídeo já terminou, força o stop
          if (videoElement.ended) {
            if (mediaRecorder.state === 'recording') {
              mediaRecorder.stop();
            }
          }

        } catch (error) {
          reject(error);
        }
      });
    }

    // Processa o arquivo enviado
    function processFile(file) {
      // Limpa transcrições anteriores
      transcriptionList.innerHTML = '';
      emptyMessage.style.display = 'none';
      transcriptParts = [];
      segmentCounter = 0;
      
      // Mostra info do arquivo
      fileInfo.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;

      const isVideo = file.type.startsWith('video/');
      const isAudio = file.type.startsWith('audio/');

      if (!isVideo && !isAudio) {
        statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> formato não suportado`;
        return;
      }

      const url = URL.createObjectURL(file);
      
      let mediaElement;
      if (isVideo) {
        mediaElement = document.createElement('video');
        mediaElement.muted = true;
        mediaElement.playsInline = true;
        mediaElement.controls = false;
      } else {
        mediaElement = document.createElement('audio');
        mediaElement.controls = false;
      }
      
      mediaElement.src = url;
      mediaElement.style.display = 'none';
      document.body.appendChild(mediaElement);

      // Ativa processamento
      setProcessingState(true);
      statusText.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> extraindo áudio...`;

      // Carrega o elemento
      mediaElement.addEventListener('loadedmetadata', function() {
        const duration = mediaElement.duration;
        if (duration === 0 || duration === Infinity) {
          statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> arquivo sem áudio/vídeo válido`;
          setProcessingState(false);
          document.body.removeChild(mediaElement);
          return;
        }

        // Para vídeos, extrai o áudio
        if (isVideo) {
          statusText.innerHTML = `<i class="fas fa-wave-square"></i> extraindo áudio do vídeo...`;
          
          extractAudioFromVideo(mediaElement).then(audioBlob => {
            // Áudio extraído com sucesso
            statusText.innerHTML = `<i class="fas fa-check-circle" style="color:#30d158;"></i> áudio extraído! iniciando transcrição...`;
            
            // Agora transcreve o áudio extraído
            transcribeAudioBlob(audioBlob, file.name);
            
          }).catch(error => {
            console.error('Erro na extração:', error);
            statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> erro ao extrair áudio`;
            setProcessingState(false);
            document.body.removeChild(mediaElement);
          });
          
        } else {
          // É áudio, vai direto para transcrição
          statusText.innerHTML = `<i class="fas fa-microphone"></i> preparando transcrição...`;
          // Converte o arquivo de áudio para Blob
          const audioBlob = file;
          transcribeAudioBlob(audioBlob, file.name);
        }

      }, { once: true });

      // Fallback
      setTimeout(() => {
        if (mediaElement.readyState < 2) {
          statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> erro no carregamento`;
          setProcessingState(false);
          if (mediaElement.parentNode) document.body.removeChild(mediaElement);
        }
      }, 5000);
    }

    // Transcreve um blob de áudio
    function transcribeAudioBlob(audioBlob, originalFileName) {
      // Cria URL para o blob
      const audioUrl = URL.createObjectURL(audioBlob);
      
      // Cria elemento de áudio para reprodução
      const audioElement = document.createElement('audio');
      audioElement.src = audioUrl;
      audioElement.controls = false;
      audioElement.style.display = 'none';
      document.body.appendChild(audioElement);

      // Prepara para transcrição
      if (!recognition) {
        recognition = initSpeechRecognition();
        if (!recognition) {
          statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> API de fala não disponível`;
          setProcessingState(false);
          document.body.removeChild(audioElement);
          return;
        }
      }

      // Limpa reconhecimento anterior
      try {
        recognition.stop();
      } catch (e) {}

      // Configura reconhecimento
      let finalTranscripts = [];
      let isRecognizing = false;
      let lastResultTime = Date.now();

      recognition.onresult = function(event) {
        let finalTranscript = '';
        
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          }
        }

        if (finalTranscript) {
          const currentTime = audioElement.currentTime;
          const minutes = Math.floor(currentTime / 60);
          const seconds = Math.floor(currentTime % 60);
          const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
          
          // Detecta se é um novo segmento
          const lastSegment = transcriptParts[transcriptParts.length - 1];
          if (lastSegment && lastSegment.text === finalTranscript.trim()) {
            return; // Evita duplicatas
          }

          // Adiciona segmento
          const character = detectSpeaker(finalTranscript);
          addTranscriptionSegment(character, timeStr, finalTranscript.trim());
          transcriptParts.push({ time: timeStr, text: finalTranscript.trim(), character });
          lastResultTime = Date.now();
        }
      };

      recognition.onerror = function(event) {
        console.error('Erro no reconhecimento:', event.error);
        if (event.error === 'no-speech') {
          // Não é um erro crítico, apenas continua
        } else if (event.error === 'not-allowed') {
          statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> permissão de microfone negada`;
        }
      };

      recognition.onend = function() {
        // Se o áudio ainda estiver tocando, reinicia
        if (!audioElement.paused && !audioElement.ended) {
          try {
            recognition.start();
          } catch (e) {
            console.log('Reiniciando reconhecimento...');
            setTimeout(() => {
              if (!audioElement.paused && !audioElement.ended) {
                try { recognition.start(); } catch (e) {}
              }
            }, 500);
          }
        } else {
          // Finaliza transcrição
          finalizeTranscription(originalFileName);
        }
      };

      // Carrega o áudio e inicia a reprodução
      audioElement.addEventListener('loadedmetadata', function() {
        startTime = Date.now();
        const duration = Math.round(audioElement.duration);
        statusText.innerHTML = `<i class="fas fa-microphone"></i> transcrevendo... 0/${duration}s`;
        
        // Inicia reprodução
        audioElement.play().then(() => {
          // Inicia reconhecimento
          try {
            recognition.start();
            isRecognizing = true;
          } catch (e) {
            console.log('Erro ao iniciar recognition:', e);
          }

          // Atualiza progresso
          const progressInterval = setInterval(() => {
            if (!audioElement.paused) {
              const current = Math.round(audioElement.currentTime);
              const total = Math.round(audioElement.duration);
              statusText.innerHTML = `<i class="fas fa-microphone"></i> transcrevendo... ${current}/${total}s`;
              
              // Atualiza barra de progresso
              const progress = (current / total) * 100;
              const progressBar = document.querySelector('.progress-bar .fill');
              if (progressBar) {
                progressBar.style.width = `${progress}%`;
              }
            }
          }, 500);

          // Armazena intervalo para limpar depois
          audioElement._progressInterval = progressInterval;

        }).catch(error => {
          console.error('Erro ao reproduzir:', error);
          statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> erro ao reproduzir áudio`;
          setProcessingState(false);
        });

      }, { once: true });

      // Quando o áudio terminar
      audioElement.addEventListener('ended', function() {
        if (recognition && isRecognizing) {
          try {
            recognition.stop();
          } catch (e) {}
        }
        if (audioElement._progressInterval) {
          clearInterval(audioElement._progressInterval);
        }
        finalizeTranscription(originalFileName);
      });

      // Fallback
      setTimeout(() => {
        if (audioElement.readyState < 2) {
          statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> erro no carregamento do áudio`;
          setProcessingState(false);
          if (audioElement.parentNode) document.body.removeChild(audioElement);
        }
      }, 5000);
    }

    // Detecta personagem baseado no texto
    function detectSpeaker(text) {
      const speakers = [
        { name: 'Apresentador', keywords: ['bem-vindo', 'olá', 'oi', 'vamos', 'começar'] },
        { name: 'Especialista', keywords: ['técnico', 'sistema', 'análise', 'dados', 'pesquisa'] },
        { name: 'Convidado', keywords: ['obrigado', 'interessante', 'pergunta', 'acredito'] },
        { name: 'Narrador', keywords: ['então', 'assim', 'agora', 'depois', 'finalmente'] }
      ];

      const lowerText = text.toLowerCase();
      let bestMatch = { name: 'Falante', score: 0 };

      for (const speaker of speakers) {
        let score = 0;
        for (const keyword of speaker.keywords) {
          if (lowerText.includes(keyword)) {
            score++;
          }
        }
        if (score > bestMatch.score) {
          bestMatch = { name: speaker.name, score: score };
        }
      }

      // Se não encontrou nenhum, tenta identificar por padrões
      if (bestMatch.score === 0) {
        if (text.length > 30) {
          return 'Narrador';
        }
        return 'Falante';
      }

      return bestMatch.name;
    }

    function addTranscriptionSegment(character, time, text) {
      const div = document.createElement('div');
      div.className = 'transcription-item';
      div.innerHTML = `
        <span class="character">${character}</span>
        <span class="time">${time}</span>
        <span class="text">${text}</span>
      `;
      transcriptionList.appendChild(div);
      
      const box = document.getElementById('transcriptionBox');
      box.scrollTop = box.scrollHeight;
    }

    function finalizeTranscription(originalFileName) {
      setProcessingState(false);
      
      // Cria barra de progresso se não existir
      if (!document.querySelector('.progress-bar')) {
        const progressBar = document.createElement('div');
        progressBar.className = 'progress-bar';
        progressBar.innerHTML = '<div class="fill" style="width: 100%;"></div>';
        document.querySelector('.particles-wrapper').appendChild(progressBar);
      }
      
      const progressBar = document.querySelector('.progress-bar .fill');
      if (progressBar) {
        progressBar.style.width = '100%';
        setTimeout(() => {
          if (progressBar.parentNode) {
            progressBar.parentNode.style.opacity = '0.3';
          }
        }, 1000);
      }

      statusText.innerHTML = `<i class="fas fa-check-circle" style="color:#30d158;"></i> transcrição concluída`;

      // Remove elementos de mídia
      const mediaElements = document.querySelectorAll('audio, video');
      mediaElements.forEach(el => {
        if (el._progressInterval) clearInterval(el._progressInterval);
        if (el.parentNode) document.body.removeChild(el);
        URL.revokeObjectURL(el.src);
      });

      if (transcriptParts.length === 0) {
        emptyMessage.style.display = 'block';
        emptyMessage.innerHTML = `
          <i class="fas fa-exclamation-circle"></i>
          <span>Nenhuma fala detectada</span>
          <p style="font-size:13px; margin-top:8px; color:rgba(255,255,255,0.3);">
            Verifique se o áudio contém fala em português
          </p>
        `;
      } else {
        // Adiciona resumo
        const summary = document.createElement('div');
        summary.style.cssText = `
          margin-top: 16px;
          padding-top: 12px;
          border-top: 0.5px solid rgba(255,255,255,0.04);
          color: rgba(255,255,255,0.2);
          font-size: 12px;
          display: flex;
          justify-content: space-between;
        `;
        summary.innerHTML = `
          <span><i class="fas fa-file-alt"></i> ${originalFileName}</span>
          <span><i class="fas fa-comment"></i> ${transcriptParts.length} falas detectadas</span>
        `;
        transcriptionList.appendChild(summary);
      }

      // Atualiza info
      fileInfo.textContent = `transcrição concluída · ${transcriptParts.length} segmentos`;
    }

    // ----- EVENTOS DE UPLOAD -----
    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (fileInput.files.length > 0) {
        processFile(fileInput.files[0]);
      }
      fileInput.value = '';
    });

    // Drag and drop
    dropArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropArea.style.borderColor = '#0a84ff';
      dropArea.style.background = 'rgba(10,132,255,0.05)';
    });

    dropArea.addEventListener('dragleave', () => {
      dropArea.style.borderColor = 'rgba(255,255,255,0.15)';
      dropArea.style.background = 'rgba(255,255,255,0.03)';
    });

    dropArea.addEventListener('drop', (e) => {
      e.preventDefault();
      dropArea.style.borderColor = 'rgba(255,255,255,0.15)';
      dropArea.style.background = 'rgba(255,255,255,0.03)';
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
    });

    // Verifica suporte
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff9f0a;"></i> API não suportada neste navegador`;
    }

    // Limpeza
    window.addEventListener('beforeunload', () => {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      const mediaElements = document.querySelectorAll('audio, video');
      mediaElements.forEach(el => {
        if (el._progressInterval) clearInterval(el._progressInterval);
        if (el.parentNode) el.parentNode.removeChild(el);
        URL.revokeObjectURL(el.src);
      });
    });

  })();
</script>
</body>
</html>
